<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Basic CSS</title>
    <style>
        #short{
            color: red;
            text-align: center;
        }
        #embed{
            font-size: larger;
            font-weight: bolder;
        }
        .player{
            text-align: right;
        }
        p{
            background-color: rgba(122, 24, 24, 0.267);
            width: 50%;
        }
        li{
            color: indianred;
        }
    </style>
</head>
<body>
    <h3 style="color: blueviolet;">Learning Basic CSS</h3>
    <h4 style="background-color: aquamarine;">Inline CSS</h4>
    <p>CSS meaning: Cascading Style Sheet</p>
    <p>Styple is colorful</p>
    <p id="short">Short form is CSS</p>
    <p class="player">Need style rule</p>
    <p class="player">After each styles you need to use semi colon</p>
    <ul>
        <li>Inline</li>
        <li id="embed">Internal or Embedded CSS</li>
        <li>External</li>
    </ul>

    <p class="player">I am Running</p>
</body>
</html>
