<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo</title>
    <style>
        h3{
            color: peru;

        }
        h3:hover{
            color: tomato;
            background-color: skyblue;
        }
        input:focus{
            color: blue;
            padding-left: 20px;
            outline: 0;
            border: 1px solid purple;
        }
        a:visited{
            color: gray;
        }
        li:last-child{
            color: red;
        }
        li:first-child{
            background-color: aqua;
        }
        li:nth-child(2n){
            color: purple;
        }
    </style>
</head>
<body>
    <h3>My Heading</h3>
    <input type="text" name="" id="">
    <input type="text" name="" id="">
    <input type="text" name="" id=""> <br>
    <a href="https://www.google.com">Google</a>


    <ul>
        <li>Ali</li>
        <li>Dali</li>
        <li>Kali</li>
        <li>Mali</li>
        <li>Pali</li>
        <li>Jali</li>
        <li>Hali</li>
    </ul>
</body>
</html>
